name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # PAT with repo scope, stays secret
          
          # Base stats - shows totals including private, no names
          base: header, activity, community, repositories, metadata
          
          # Language breakdown across ALL repos (no names shown)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage, bytes-size
          
          # Lines of code - aggregate only
          plugin_lines: yes
          
          # Contribution graph - just activity density
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # DO NOT include these (expose names/diffs):
          # plugin_repositories: yes
          # plugin_notable: yes
